<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SOC Transport">
<meta name="theme-color" content="#000000">
<title>SOC Transport — Emtel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000;--bg1:#0f0f0f;--bg2:#161616;--bg3:#1f1f1f;--bg4:#282828;
  --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.12);--line3:rgba(255,255,255,.18);
  --blue:#2563EB;--blue-l:#3B82F6;--blue-d:rgba(37,99,235,.18);
  --green:#10B981;--green-d:rgba(16,185,129,.13);
  --amber:#F59E0B;--amber-d:rgba(245,158,11,.13);
  --rose:#F43F5E;--rose-d:rgba(244,63,94,.12);
  --violet:#7C3AED;--violet-d:rgba(124,58,237,.13);
  --t1:#fff;--t2:#a1a1aa;--t3:#52525b;--t4:#3f3f46;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);font-size:15px;-webkit-font-smoothing:antialiased;}
#app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* Scroll */
.scroll{flex:1;overflow-y:auto;padding-bottom:90px;}
.pg{padding:18px 16px;}

/* Topbar */
.topbar{background:rgba(0,0,0,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;flex-shrink:0;}
.tb-label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;}
.tb-title{font-size:18px;font-weight:800;letter-spacing:-.03em;}
.tb-right{display:flex;align-items:center;gap:10px;}
.tb-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--line3);transition:opacity .15s;flex-shrink:0;}
.tb-av:active{opacity:.7;}
.tb-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--t3);cursor:pointer;padding:4px 0;}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(0,0,0,.94);backdrop-filter:blur(24px);border-top:1px solid var(--line);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:30;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer;border:none;background:transparent;color:var(--t3);font-size:10px;font-weight:600;font-family:'Inter',sans-serif;letter-spacing:.01em;transition:color .15s;position:relative;}
.nb.on{color:var(--t1);}
.nb svg{width:20px;height:20px;}
.nb-pip{position:absolute;top:4px;right:calc(50% - 15px);width:6px;height:6px;background:var(--rose);border-radius:50%;border:1.5px solid var(--bg);}

/* Bento metrics */
.bento{display:grid;gap:8px;margin-bottom:18px;}
.g2{grid-template-columns:1fr 1fr;}
.g3{grid-template-columns:repeat(3,1fr);}
.g4{grid-template-columns:repeat(4,1fr);}
.tile{background:var(--bg1);border:1px solid var(--line);border-radius:14px;padding:15px 13px;}
.tile .tv{font-size:26px;font-weight:900;letter-spacing:-.04em;line-height:1;}
.tile .tl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-top:6px;}
.tile-sm .tv{font-size:22px;}

/* Section label */
.sh{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}

/* Cards */
.card{background:var(--bg1);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:12px;}
.card-body{padding:16px;}
.card-title{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:14px;}

/* Badges */
.b{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;letter-spacing:.01em;}
.b-g{background:var(--green-d);color:#34D399;}
.b-a{background:var(--amber-d);color:#FCD34D;}
.b-r{background:var(--rose-d);color:#FB7185;}
.b-v{background:var(--violet-d);color:#A78BFA;}
.b-bl{background:var(--blue-d);color:#93C5FD;}
.b-z{background:rgba(255,255,255,.06);color:var(--t3);}
.b-sa{background:rgba(37,99,235,.2);color:#93C5FD;}
.b-sb{background:rgba(245,158,11,.2);color:#FCD34D;}
.b-sc{background:rgba(124,58,237,.2);color:#A78BFA;}
.b-nm{background:rgba(20,184,166,.15);color:#5EEAD4;}
.b-sm{background:rgba(139,92,246,.15);color:#C4B5FD;}

/* Inputs */
.inp{width:100%;padding:12px 14px;border:1px solid var(--line2);border-radius:12px;font-size:14px;font-weight:500;font-family:'Inter',sans-serif;color:var(--t1);background:var(--bg2);-webkit-appearance:none;outline:none;transition:border-color .15s;}
.inp:focus{border-color:var(--blue-l);}
.inp::placeholder{color:var(--t3);}
.inp-label{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;}
.ig{margin-bottom:14px;}
.irow{display:flex;gap:10px;}

/* Buttons */
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:-.01em;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.97);opacity:.85;}
.btn:disabled{opacity:.3;cursor:default;transform:none;}
.btn-p{background:var(--t1);color:var(--bg);}
.btn-s{background:var(--bg2);color:var(--t1);border:1px solid var(--line2);}
.btn-g{background:var(--green-d);color:#34D399;border:1px solid rgba(16,185,129,.2);}
.btn-r{background:var(--rose-d);color:#FB7185;border:1px solid rgba(244,63,94,.2);}
.btn-a{background:var(--amber-d);color:#FCD34D;border:1px solid rgba(245,158,11,.2);}
.btn-sm2{padding:9px 14px;font-size:13px;border-radius:10px;width:auto;}

/* Shift selector */
.shift-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px;}
.sc{border:1px solid var(--line2);border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;background:var(--bg1);transition:all .15s;}
.sc:active{transform:scale(.96);}
.sc .sn{font-size:17px;font-weight:800;letter-spacing:-.02em;}
.sc .st{font-size:10px;color:var(--t3);margin-top:4px;font-weight:500;}
.sc.onA{border-color:var(--blue-l);background:var(--blue-d);}
.sc.onA .sn{color:#93C5FD;}
.sc.onB{border-color:var(--amber);background:var(--amber-d);}
.sc.onB .sn{color:#FCD34D;}
.sc.onC{border-color:var(--violet);background:var(--violet-d);}
.sc.onC .sn{color:#A78BFA;}

/* Leg card */
.leg{border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:10px;background:var(--bg1);}
.leg-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;}
.leg-title{font-size:15px;font-weight:700;letter-spacing:-.01em;}
.choices{display:flex;gap:7px;}
.cb{flex:1;padding:10px 4px;border:1px solid var(--line2);border-radius:10px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;background:transparent;color:var(--t3);text-align:center;transition:all .15s;}
.cb:active{transform:scale(.94);}
.cb.cL{border-color:var(--green);background:var(--green-d);color:#34D399;}
.cb.cO{border-color:var(--rose);background:var(--rose-d);color:#FB7185;}
.cb.cB{border-color:var(--amber);background:var(--amber-d);color:#FCD34D;}
.drv-wrap{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:12px;}
.drv-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.refund-pill{font-size:12px;font-weight:600;color:#34D399;background:var(--green-d);border-radius:8px;padding:7px 12px;margin-top:10px;}
.fixed-pill{font-size:12px;color:var(--t3);background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:8px 12px;}
.divider{height:1px;background:var(--line);margin:13px 0;}
.tog-row{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:3px 0;}
.tog-label{font-size:13px;font-weight:600;color:#FB7185;}
.tog{width:44px;height:26px;border-radius:13px;background:var(--bg3);position:relative;transition:background .2s;flex-shrink:0;}
.tog.on{background:var(--rose);}
.tog-k{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 2px 6px rgba(0,0,0,.5);}
.tog.on .tog-k{transform:translateX(18px);}
.unsch-panel{background:var(--rose-d);border:1px solid rgba(244,63,94,.2);border-radius:12px;padding:14px;margin-top:12px;}
.unsch-head{font-size:10px;font-weight:700;color:#FB7185;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}

/* Chart */
.chart{height:88px;display:flex;align-items:flex-end;gap:4px;}
.cc{flex:1;display:flex;flex-direction:column;justify-content:flex-end;}
.cb2{border-radius:4px 4px 0 0;min-height:4px;}
.cl{font-size:9px;color:var(--t4);text-align:center;margin-top:5px;font-weight:600;}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;}
.li{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2);font-weight:500;}
.ld{width:8px;height:8px;border-radius:3px;}

/* History entries */
.he{padding:14px 0;border-bottom:1px solid var(--line);}
.he:last-child{border-bottom:none;}
.he-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
.he-date{font-size:14px;font-weight:700;letter-spacing:-.01em;}
.he-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.back-chip{font-size:10px;font-weight:700;background:var(--amber-d);color:#FCD34D;padding:2px 7px;border-radius:5px;}

/* Roster */
.roster{background:var(--bg1);border:1px solid var(--line);border-radius:16px;overflow:hidden;}
.rr{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--line);gap:12px;transition:background .1s;cursor:default;}
.rr:last-child{border-bottom:none;}
.rr.clickable{cursor:pointer;}
.rr.clickable:active{background:var(--bg2);}
.rav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.rname{font-size:14px;font-weight:700;letter-spacing:-.01em;}
.rsub{font-size:11px;color:var(--t3);margin-top:2px;}
.rbadges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;margin-left:auto;}

/* Special cards */
.spc{background:var(--bg1);border:1px solid var(--line);border-left:3px solid var(--rose);border-radius:14px;padding:15px;margin-bottom:10px;}
.spc.rev{border-left-color:var(--green);}

/* Recon */
.recon-row{display:flex;align-items:center;padding:13px 0;border-bottom:1px solid var(--line);gap:12px;}
.recon-row:last-child{border-bottom:none;}
.rn .n{font-size:16px;font-weight:800;letter-spacing:-.03em;}
.rn .l{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}

/* Menu items */
.mi{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;background:var(--bg1);border:1px solid var(--line);border-radius:14px;margin-bottom:8px;cursor:pointer;transition:background .1s;}
.mi:active{background:var(--bg2);}
.mi-left{display:flex;align-items:center;gap:13px;}
.mi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.mi-label{font-size:15px;font-weight:700;}
.mi-sub{font-size:12px;color:var(--t3);margin-top:2px;}

/* Avatar colours */
.av-blue  {background:rgba(59,130,246,.18);color:#93C5FD;}
.av-teal  {background:rgba(20,184,166,.18);color:#5EEAD4;}
.av-green {background:rgba(34,197,94,.18);color:#86EFAC;}
.av-amber {background:rgba(245,158,11,.18);color:#FCD34D;}
.av-coral {background:rgba(251,113,133,.18);color:#FDA4AF;}
.av-purple{background:rgba(139,92,246,.18);color:#C4B5FD;}
.av-pink  {background:rgba(236,72,153,.18);color:#F9A8D4;}
.av-navy  {background:rgba(99,102,241,.18);color:#A5B4FC;}

/* ── LOGIN ──────────────────────────────────────── */
.login-screen{min-height:100vh;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;position:relative;}
.login-glow{position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(37,99,235,.14) 0%,transparent 70%);pointer-events:none;}
.login-top{padding:60px 24px 32px;position:relative;z-index:1;}
.login-eye{display:inline-flex;align-items:center;gap:7px;background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.22);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;color:#93C5FD;letter-spacing:.06em;text-transform:uppercase;margin-bottom:22px;}
.login-dot{width:6px;height:6px;border-radius:50%;background:var(--blue-l);}
.login-h1{font-size:48px;font-weight:900;letter-spacing:-.06em;line-height:.9;color:var(--t1);margin-bottom:12px;}
.login-h1 span{color:var(--blue-l);}
.login-sub{font-size:15px;color:var(--t3);}
.login-body{flex:1;background:var(--bg1);border-radius:28px 28px 0 0;border-top:1px solid var(--line);padding:26px 20px 32px;position:relative;z-index:1;overflow-y:auto;}

/* Search */
.srch-wrap{position:relative;margin-bottom:10px;}
.srch-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--t3);pointer-events:none;}
.srch-inp{width:100%;padding:14px 14px 14px 42px;border:1px solid var(--line2);border-radius:14px;font-size:15px;font-weight:500;font-family:'Inter',sans-serif;color:var(--t1);background:var(--bg2);-webkit-appearance:none;outline:none;transition:border-color .15s;}
.srch-inp:focus{border-color:var(--blue-l);}
.srch-inp::placeholder{color:var(--t3);}
.results{background:var(--bg2);border:1px solid var(--line2);border-radius:14px;overflow:hidden;margin-top:4px;}
.ri{display:flex;align-items:center;gap:13px;padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s;}
.ri:last-child{border-bottom:none;}
.ri:active{background:var(--bg3);}
.ri-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.ri-name{font-size:14px;font-weight:700;}
.ri-role{font-size:11px;color:var(--t3);margin-top:2px;}
.no-res{padding:24px;text-align:center;color:var(--t3);font-size:14px;}
.srch-hint{font-size:12px;color:var(--t3);padding:0 2px;margin-top:8px;}

/* ── PIN ────────────────────────────────────────── */
.pin-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:32px;max-width:430px;margin:0 auto;}
.pin-glow{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:280px;height:280px;background:radial-gradient(circle,rgba(37,99,235,.1) 0%,transparent 70%);pointer-events:none;border-radius:50%;}
.pin-who{font-size:13px;color:var(--t3);font-weight:500;margin-bottom:5px;position:relative;}
.pin-title{font-size:28px;font-weight:900;letter-spacing:-.04em;margin-bottom:8px;position:relative;}
.pin-hint{font-size:13px;color:var(--t3);margin-bottom:40px;text-align:center;line-height:1.6;position:relative;}
.pin-dots{display:flex;gap:16px;margin-bottom:44px;position:relative;}
.pd{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--t4);background:transparent;transition:all .18s;}
.pd.f{background:var(--t1);border-color:var(--t1);}
.pd.e{background:var(--rose);border-color:var(--rose);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:272px;margin-bottom:26px;position:relative;}
.pk{height:72px;border-radius:16px;border:1px solid var(--line2);font-size:26px;font-weight:700;font-family:'Inter',sans-serif;color:var(--t1);background:var(--bg1);cursor:pointer;transition:all .1s;}
.pk:active{background:var(--bg2);transform:scale(.93);}
.pk.del{font-size:19px;}
.pk.emp{background:transparent;border-color:transparent;pointer-events:none;}
.pin-err{font-size:13px;color:#FB7185;font-weight:600;position:relative;}
.pin-link{font-size:13px;color:var(--t3);cursor:pointer;margin-top:16px;text-decoration:underline;text-underline-offset:3px;position:relative;}
.pin-back{font-size:13px;color:var(--t3);cursor:pointer;margin-top:14px;position:relative;}

/* ── Misc ─────────────────────────────────────── */
.info-box{border-radius:12px;padding:13px 15px;margin-bottom:16px;font-size:13px;font-weight:500;line-height:1.6;}
.err-box{background:var(--rose-d);border:1px solid rgba(244,63,94,.22);border-radius:12px;padding:12px 15px;font-size:13px;color:#FB7185;margin-bottom:12px;}
.ok-box{background:var(--green-d);border:1px solid rgba(16,185,129,.22);border-radius:12px;padding:12px 15px;font-size:13px;color:#34D399;margin-bottom:12px;}
.empty-state{text-align:center;padding:48px 24px;}
.empty-icon{font-size:36px;margin-bottom:12px;}
.empty-text{font-size:14px;color:var(--t3);font-weight:500;line-height:1.6;}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--t3);font-size:14px;}
.spin{width:18px;height:18px;border:2px solid var(--line2);border-top-color:var(--blue-l);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--bg2);color:var(--t1);padding:11px 22px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:opacity .22s;pointer-events:none;white-space:nowrap;z-index:200;border:1px solid var(--line2);box-shadow:0 8px 32px rgba(0,0,0,.8);}
.toast.show{opacity:1;}
.fb{display:flex;justify-content:space-between;align-items:center;}
.done-card{background:var(--green-d);border:1px solid rgba(16,185,129,.22);border-radius:16px;padding:28px;text-align:center;}
.back-warn{background:var(--amber-d);border:1px solid rgba(245,158,11,.22);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;color:#FCD34D;margin-bottom:16px;}
@keyframes fu{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fu .28s ease both;}

/* Staff Directory specific */
.staff-card{background:var(--bg1);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:background .1s;}
.staff-card:active{background:var(--bg2);}
.staff-inactive{opacity:.45;}

/* Validation table */
.vtable{width:100%;border-collapse:collapse;font-size:12px;}
.vtable th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);color:var(--t3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
.vtable td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
.vtable tr:last-child td{border-bottom:none;}
.v-match{color:#34D399;}
.v-query{color:#FCD34D;}
.v-miss{color:#FB7185;}
.v-unk{color:var(--t3);}

/* Upload zone */
.upload-zone{border:1.5px dashed var(--line3);border-radius:16px;padding:32px 24px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--blue-l);background:var(--blue-d);}
.upload-zone input{display:none;}
.upload-icon{font-size:32px;margin-bottom:10px;}
.upload-title{font-size:14px;font-weight:700;margin-bottom:4px;}
.upload-sub{font-size:12px;color:var(--t3);}

/* Progress steps */
.steps{display:flex;gap:0;margin-bottom:20px;}
.step{flex:1;text-align:center;position:relative;}
.step::after{content:'';position:absolute;top:12px;left:50%;width:100%;height:1px;background:var(--line);}
.step:last-child::after{display:none;}

async function dbLoad(){
  S.loading=true; render();
  try{
    const[d,e,sp]=await Promise.all([
      db.from('declarations').select('*'),
      db.from('special_events').select('*'),
      db.from('staff_profiles').select('*').order('team').order('name'),
    ]);
    if(d.error)throw d.error;
    if(e.error)throw e.error;
    if(sp.error)throw sp.error;
    S.decls=d.data||[];
    S.events=e.data||[];
    S.staffProfiles=sp.data||[];
    S.err=null;
  }catch(ex){S.err='Could not connect to database.';console.error(ex);}
  S.loading=false; render();
}

async function dbSaveDecl(row){
  const{data,error}=await db.from('declarations').upsert(row,{onConflict:'analyst_id,date'}).select();
  if(error){toast('Save failed — try again');console.error(error);return false;}
  S.decls=S.decls.filter(d=>!(d.analyst_id===row.analyst_id&&d.date===row.date));
  if(data)S.decls.push(...data);
  return true;
}
async function dbSaveEv(row){
  const{data,error}=await db.from('special_events').insert(row).select();
  if(error){toast('Save failed');return false;}
  if(data)S.events.push(...data);
  return true;
}
async function dbUpdEv(id,changes){
  const{error}=await db.from('special_events').update(changes).eq('id',id);
  if(error){toast('Update failed');return false;}
  const ev=S.events.find(e=>e.id===id);if(ev)Object.assign(ev,changes);
  return true;
}
async function dbSaveStaff(row){
  if(row.id){
    const{data,error}=await db.from('staff_profiles').update(row).eq('id',row.id).select();
    if(error){toast('Save failed');console.error(error);return false;}
    const idx=S.staffProfiles.findIndex(s=>s.id===row.id);
    if(idx>=0&&data)S.staffProfiles[idx]=data[0];
  }else{
    const{data,error}=await db.from('staff_profiles').insert(row).select();
    if(error){toast('Save failed');console.error(error);return false;}
    if(data)S.staffProfiles.push(...data);
  }
  return true;
}
async function dbToggleStaff(id,active){
  const{error}=await db.from('staff_profiles').update({active}).eq('id',id);
  if(error){toast('Update failed');return;}
  const s=S.staffProfiles.find(x=>x.id===id);if(s)s.active=active;
  render();
}

function rLogin(){
  const q=S.query.trim().toLowerCase();
  const all=CONFIG.appUsers;
  const filtered=q?all.filter(s=>s.name.toLowerCase().includes(q)):all;
  const groups=[{label:'Managers',items:filtered.filter(s=>s.role==='manager')},{label:'Analysts',items:filtered.filter(s=>s.role==='analyst')}];
  const resultRows=groups.map(g=>g.items.length?`
    <div style="padding:6px 14px 4px;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;">${g.label}</div>
    ${g.items.map(s=>`<div class="ri" onclick="selU(${s.id})">
      <div class="ri-av ${avc(s.color)}">${s.initials}</div>
      <div><div class="ri-name">${s.name}</div><div class="ri-role">${s.role==='manager'?'Manager':'Analyst'}</div></div>
    </div>`).join('')}`:'').join('');
  return`<div class="login-screen">
    <div class="login-glow"></div>
    <div class="login-top">
      <div class="login-eye"><div class="login-dot"></div>Emtel SOC</div>
      <div class="login-h1">SOC<br><span>Transport</span></div>
      <div class="login-sub">Real-time transport management</div>
    </div>
    <div class="login-body">
      <div class="ig">
        <div class="inp-label" style="margin-bottom:10px;">Who are you?</div>
        <div class="srch-wrap">
          <div class="srch-icon">${I.search}</div>
          <input id="srch" class="srch-inp" type="text" placeholder="Search your name…"
            value="${S.query}" oninput="S.query=this.value;render()"
            autocomplete="off" autocorrect="off" autocapitalize="words"/>
        </div>
        ${filtered.length?`<div class="results" style="margin-top:6px;">${resultRows}</div>`:
          q?`<div class="results" style="margin-top:6px;"><div class="no-res">No match found</div></div>`:
          `<div class="srch-hint">Type your name above to sign in</div>`}
      </div>
    </div>
  </div>`;
}

function rPin(){
  const u=byId(S.selId);
  const dots=[0,1,2,3].map(i=>`<div class="pd ${i<S.pinBuf.length?'f':''} ${S.pinErr&&i<S.pinBuf.length?'e':''}"></div>`).join('');
  const keys=[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>k===''?`<div class="pk emp"></div>`:`<button class="pk ${k==='⌫'?'del':''}" onclick="pK('${k}')">${k}</button>`).join('');
  return`<div class="pin-screen"><div class="pin-glow"></div>
    <div class="pin-who">${u?.name||''}</div>
    <div class="pin-title">Enter PIN</div>
    <div class="pin-hint">Default is <strong>${CONFIG.defaultPin}</strong> if you haven't<br>set a personal PIN yet</div>
    <div class="pin-dots">${dots}</div>
    <div class="pin-grid">${keys}</div>
    ${S.pinErr?`<div class="pin-err">Incorrect PIN — try again</div>`:'<div style="height:20px;"></div>'}
    <div class="pin-link" onclick="goRst(${S.selId})">Forgot PIN?</div>
    <div class="pin-back" onclick="goLogin()">← Different person</div>
  </div>`;
}
function pK(k){
  if(k==='⌫'){S.pinBuf=S.pinBuf.slice(0,-1);S.pinErr=false;render();return;}
  if(S.pinBuf.length>=4)return;
  S.pinBuf+=k;render();
  if(S.pinBuf.length===4)setTimeout(chkPin,120);
}
function chkPin(){
  if(S.pinBuf===LS.getPin(S.selId)){
    S.user=byId(S.selId);LS.setSess(S.selId);
    S.screen='app';S.pinBuf='';S.pinErr=false;dbLoad();
  }else{S.pinErr=true;setTimeout(()=>{S.pinBuf='';S.pinErr=false;render();},800);render();}
}
function goLogin(){S.screen='login';S.selId=null;S.pinBuf='';S.pinErr=false;render();}

/* ═══════════════════════════════════════════════════
   CHANGE PIN
═══════════════════════════════════════════════════ */
function rChg(){
  const step={old:['Verify identity','Enter your current PIN'],new:['New PIN','Choose any 4 digits'],cfm:['Confirm PIN','Re-enter your new PIN']};
  const[title,hint]=step[S.pinMode]||step.old;
  const buf=S.pinMode==='cfm'?S.pinNew:S.pinBuf;
  const dots=[0,1,2,3].map(i=>`<div class="pd ${i<buf.length?'f':''} ${S.pinErr&&i<buf.length?'e':''}"></div>`).join('');
  const keys=[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>k===''?`<div class="pk emp"></div>`:`<button class="pk ${k==='⌫'?'del':''}" onclick="cpK('${k}')">${k}</button>`).join('');
  return`<div class="pin-screen"><div class="pin-glow"></div>
    <div class="pin-who">${S.user?.name}</div>
    <div class="pin-title">${title}</div>
    <div class="pin-hint">${hint}</div>
    <div class="pin-dots">${dots}</div>
    <div class="pin-grid">${keys}</div>
    ${S.pinErr?`<div class="pin-err">${S.pinMode==='cfm'?'PINs do not match':'Incorrect PIN'}</div>`:'<div style="height:20px;"></div>'}
    <div class="pin-back" onclick="canCP()">Cancel</div>
  </div>`;
}
function cpK(k){
  const isCfm=S.pinMode==='cfm';
  if(k==='⌫'){if(isCfm)S.pinNew=S.pinNew.slice(0,-1);else S.pinBuf=S.pinBuf.slice(0,-1);S.pinErr=false;render();return;}
  if(isCfm){if(S.pinNew.length>=4)return;S.pinNew+=k;}else{if(S.pinBuf.length>=4)return;S.pinBuf+=k;}
  render();
  if((isCfm?S.pinNew:S.pinBuf).length===4)setTimeout(stepCP,120);
}
function stepCP(){
  if(S.pinMode==='old'){
    if(S.pinBuf===LS.getPin(S.user.id)){S.pinMode='new';S.pinBuf='';S.pinErr=false;}
    else{S.pinErr=true;setTimeout(()=>{S.pinBuf='';S.pinErr=false;render();},800);}
  }else if(S.pinMode==='new'){S.pinMode='cfm';S.pinNew='';S.pinErr=false;}
  else if(S.pinMode==='cfm'){
    if(S.pinNew===S.pinBuf){LS.setPin(S.user.id,S.pinBuf);toast('PIN updated');setTimeout(()=>{S.screen='app';S.pinBuf='';S.pinNew='';S.pinMode='login';render();},500);return;}
    else{S.pinErr=true;setTimeout(()=>{S.pinNew='';S.pinErr=false;render();},800);}
  }
  render();
}
function canCP(){S.screen='app';S.pinBuf='';S.pinNew='';S.pinMode='login';S.pinErr=false;render();}

function rRst(){
  const tid=S.pinTarget||S.selId,target=byId(tid);
  const dots=[0,1,2,3].map(i=>`<div class="pd ${i<S.pinBuf.length?'f':''} ${S.pinErr&&i<S.pinBuf.length?'e':''}"></div>`).join('');
  const keys=[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>k===''?`<div class="pk emp"></div>`:`<button class="pk ${k==='⌫'?'del':''}" onclick="rpK('${k}')">${k}</button>`).join('');
  return`<div class="pin-screen"><div class="pin-glow"></div>
    <div class="pin-who">Reset PIN for ${target?.name}</div>
    <div class="pin-title">Manager override</div>
    <div class="pin-hint">A manager enters the override PIN.<br>Resets to <strong>${CONFIG.defaultPin}</strong>.</div>
    <div class="pin-dots">${dots}</div>
    <div class="pin-grid">${keys}</div>
    ${S.pinErr?`<div class="pin-err">Incorrect override PIN</div>`:'<div style="height:20px;"></div>'}
    <div class="pin-back" onclick="canRP()">Cancel</div>
  </div>`;
}
function goRst(tid){S.pinTarget=tid;S.pinBuf='';S.pinErr=false;S.screen='rst';render();}
function rpK(k){
  if(k==='⌫'){S.pinBuf=S.pinBuf.slice(0,-1);S.pinErr=false;render();return;}
  if(S.pinBuf.length>=4)return;
  S.pinBuf+=k;render();
  if(S.pinBuf.length===4)setTimeout(chkRP,120);
}
function chkRP(){
  if(S.pinBuf===CONFIG.resetPin){
    const tid=S.pinTarget||S.selId;LS.resetPin(tid);toast('PIN reset to '+CONFIG.defaultPin);
    setTimeout(()=>{S.pinBuf='';S.pinTarget=null;S.screen=S.user?'app':'pin';render();},600);
  }else{S.pinErr=true;setTimeout(()=>{S.pinBuf='';S.pinErr=false;render();},800);render();}
}
function canRP(){S.pinBuf='';S.pinErr=false;S.screen=S.user?'app':'pin';render();}

function rDForm(){

function rLeg(leg){

  let h=`<div class="leg"><div class="leg-head">
    <div class="leg-title">${leg.label} <span style="color:var(--t3);font-weight:500;font-size:13px;">${leg.time}</span></div>

  </div>`;
  if(leg.provided){
    h+=`<div class="choices">${[{k:'logidis',l:'Logidis'},{k:'own',l:'Own vehicle'},{k:'bus',l:'Public bus'}].map(o=>
      `<button class="cb ${c===o.k?o.k==='logidis'?'cL':o.k==='own'?'cO':'cB':''}" onclick="pick('${leg.id}','${o.k}')">${o.l}</button>`
    ).join('')}</div>`;
    if(c==='logidis')h+=`<div class="drv-wrap"><div class="drv-label">Logidis vehicle details</div>
      <div class="irow">
        <div style="flex:1;"><div class="inp-label">Driver name</div><input class="inp" style="padding:10px 12px;font-size:13px;" placeholder="e.g. Jean-Pierre" value="${dv}" oninput="S.${leg.id==='in'?'dIn':'dOut'}=this.value"/></div>
        <div style="flex:1;"><div class="inp-label">Car plate</div><input class="inp" style="padding:10px 12px;font-size:13px;text-transform:uppercase;" placeholder="B 1234 X" value="${pv}" oninput="S.${leg.id==='in'?'pIn':'pOut'}=this.value.toUpperCase()"/></div>
      </div></div>`;
    if(c&&c!=='logidis')h+=`<div class="refund-pill">💳 Bus fare refund eligible for this leg</div>`;
  }else{
    h+=`<div class="fixed-pill">No company transport scheduled for this leg</div>
      <div class="refund-pill" style="margin-top:8px;">💳 Refund eligible — auto-included</div>
      <div class="divider"></div>
      <div class="tog-row" onclick="togU('${leg.id}')">
        <span class="tog-label">Company transport was provided today?</span>
        <div class="tog ${ut?'on':''}"><div class="tog-k"></div></div>

    if(ut)h+=`<div class="unsch-panel"><div class="unsch-head">Unscheduled transport details</div>
      <div class="ig"><div class="inp-label">Actual time</div><input type="time" class="inp" style="padding:10px 12px;font-size:13px;" value="${ud.time||''}" onchange="setUD('${leg.id}','time',this.value)"/></div>
      <div class="irow">
        <div style="flex:1;" class="ig"><div class="inp-label">Driver</div><input class="inp" style="padding:10px 12px;font-size:13px;" placeholder="Optional" value="${ud.driver||''}" oninput="setUD('${leg.id}','driver',this.value)"/></div>
        <div style="flex:1;" class="ig"><div class="inp-label">Plate</div><input class="inp" style="padding:10px 12px;font-size:13px;text-transform:uppercase;" placeholder="Optional" value="${ud.plate||''}" oninput="setUD('${leg.id}','plate',this.value.toUpperCase())"/></div>
      </div>
      <div class="ig"><div class="inp-label">Reason</div><input class="inp" style="padding:10px 12px;font-size:13px;" placeholder="e.g. Heavy rain, cyclone warning…" value="${ud.reason||''}" oninput="setUD('${leg.id}','reason',this.value)"/>
      <div style="font-size:11px;color:var(--t3);margin-top:6px;">Manager may adjust wording</div></div>
    </div>`;
  }
  return h+'</div>';
}

/* ── History ─────────────────────────────────────── */
function rHist(){
  const uid=S.user.id,hist=uDecls(uid);
  if(!hist.length)return`<div class="pg fu"><div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No declarations yet.<br>Use Declare to log your first entry.</div></div></div>`;
  const logT=hist.reduce((s,h)=>s+(h.leg_in==='logidis'?1:0)+(h.leg_out==='logidis'?1:0),0);
  const refD=hist.filter(h=>isRef(h.leg_in)||isRef(h.leg_out)).length;
  const c14=[...hist].slice(0,14).reverse();
  const bars=c14.map(e=>{
    const l=(e.leg_in==='logidis'?1:0)+(e.leg_out==='logidis'?1:0),r=(isRef(e.leg_in)?1:0)+(isRef(e.leg_out)?1:0);
    const sp=S.events.some(s=>s.analyst_id===uid&&s.date===e.date),t=Math.max(l+r,1),lp=Math.round((l/t)*100);
    return`<div class="cc"><div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;">
      ${l?`<div class="cb2" style="height:${lp}%;background:var(--green);"></div>`:''}
      ${r?`<div class="cb2" style="height:${100-lp}%;background:var(--amber);"></div>`:''}
      ${sp?`<div style="height:3px;background:var(--rose);border-radius:0;"></div>`:''}
    </div><div class="cl">${e.date.slice(8)}</div></div>`;
  }).join('');
  const L={logidis:'Logidis',own:'Own vehicle',bus:'Public bus',auto:'Public transport'};
  const items=hist.map(e=>{
    const s2=SH[e.shift],hasR=isRef(e.leg_in)||isRef(e.leg_out);
    const spd=S.events.filter(s=>s.analyst_id===uid&&s.date===e.date&&!s.is_inline);
    const drv=e.leg_in==='logidis'&&(e.driver_name_in||e.car_plate_in)?`<div style="font-size:11px;color:var(--t3);margin-top:5px;">🚗 ${[e.driver_name_in,e.car_plate_in].filter(Boolean).join(' · ')}</div>`:'';
    return`<div class="he"><div class="he-top">
      <div><div class="he-date">${fmtD(e.date)}</div>${e.backdated?`<span class="back-chip">Backdated</span>`:''}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;">
        <span class="b ${e.shift==='A'?'b-sa':e.shift==='B'?'b-sb':'b-sc'}">${e.shift}</span>
        ${hasR?'<span class="b b-a">Refund</span>':''}${spd.length?'<span class="b b-r">Special</span>':''}
      </div></div>
      <div class="he-pills">
        ${e.leg_in?`<span class="b ${e.leg_in==='logidis'?'b-g':'b-a'}">IN — ${L[e.leg_in]||e.leg_in}</span>`:''}
        ${e.leg_out?`<span class="b ${e.leg_out==='logidis'?'b-g':'b-a'}">OUT — ${L[e.leg_out]||e.leg_out}</span>`:''}
        ${spd.map(s=>`<span class="b b-r">Special ${s.direction?.toUpperCase()||''} ${s.event_time||''}</span>`).join('')}
      </div>${drv}
    </div>`;
  }).join('');
  return`<div class="pg fu">
    <div class="bento g3" style="margin-bottom:18px;">
      <div class="tile tile-sm"><div class="tv">${hist.length}</div><div class="tl">Days logged</div></div>
      <div class="tile tile-sm"><div class="tv" style="color:#34D399;">${logT}</div><div class="tl">Logidis</div></div>
      <div class="tile tile-sm"><div class="tv" style="color:#FCD34D;">${refD}</div><div class="tl">Refund days</div></div>
    </div>
    <div class="card"><div class="card-body"><div class="card-title">Last ${c14.length} days</div>
      <div class="chart">${bars}</div>
      <div class="legend">
        <div class="li"><div class="ld" style="background:var(--green);"></div>Logidis</div>
        <div class="li"><div class="ld" style="background:var(--amber);"></div>Refund-eligible</div>
        <div class="li"><div class="ld" style="background:var(--rose);"></div>Special event</div>
      </div></div></div>
    <div class="card"><div class="card-body"><div class="card-title">Full log — ${fmtM()}</div>${items}</div></div>
  </div>`;
}

/* ── Today ───────────────────────────────────────── */
function rMToday(){
  const td=tod(),tdd=S.decls.filter(d=>d.date===td),total=anas().length;
  const logT=tdd.reduce((s,d)=>s+(d.leg_in==='logidis'?1:0)+(d.leg_out==='logidis'?1:0),0);
  const refT=tdd.reduce((s,d)=>s+(isRef(d.leg_in)?1:0)+(isRef(d.leg_out)?1:0),0);
  const spT=S.events.filter(e=>e.date===td).length;
  const L={logidis:'Log',own:'Own',bus:'Bus',auto:'Auto'};
  const rows=anas().map(a=>{
    const d=tdd.find(x=>x.analyst_id===a.id),hasSp=S.events.some(e=>e.analyst_id===a.id&&e.date===td);
    const s2=d?.shift?SH[d.shift]:null;
    const cell=(val,prov)=>{
      if(!prov)return`<span class="b b-z" style="font-size:10px;">Auto</span>`;
      if(!val) return`<span class="b b-z" style="font-size:10px;">–</span>`;
      return`<span class="b ${val==='logidis'?'b-g':'b-a'}" style="font-size:10px;">${L[val]||val}</span>`;
    };
    return`<div class="rr"><div class="rav ${avc(a.color)}">${a.initials}</div>
      <div style="flex:1;"><div class="rname">${a.name}</div>
        <div class="rsub">${d?'Shift '+d.shift+' · '+SH[d.shift]?.time:'Not declared yet'}</div></div>
      <div class="rbadges">
        ${s2?cell(d?.leg_in,s2.legs[0].provided):''}
        ${s2?cell(d?.leg_out,s2.legs[1].provided):''}
        ${hasSp?`<span class="b b-r" style="font-size:10px;">Sp</span>`:''}
        <span class="b ${d?'b-g':'b-z'}" style="font-size:10px;">${d?'Done':'–'}</span>
      </div></div>`;
  }).join('');
  return`<div class="pg fu">
    <div class="bento g4" style="margin-bottom:18px;">
      <div class="tile tile-sm"><div class="tv">${tdd.length}<span style="font-size:12px;color:var(--t3);">/${total}</span></div><div class="tl">Declared</div></div>

/* ═══════════════════════════════════════════════════
   EXCEL PARSING — ROSTER
═══════════════════════════════════════════════════ */
function handleRosterFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'array'});
    const parsed=[];
    wb.SheetNames.forEach(sheetName=>{
      const ws=wb.Sheets[sheetName];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      parseRosterSheet(raw,parsed,sheetName);
    });
    S.rosterData=parsed;
    S.rosterParsed=true;
    render();
  };
  reader.readAsArrayBuffer(file);
}

function parseRosterSheet(raw,parsed,sheetName){
  // Find header row (contains "Date" or "DATE")
  let headerRow=-1;
  for(let i=0;i<raw.length;i++){
    const r=raw[i];
    if(r&&r.some(c=>typeof c==='string'&&c.toUpperCase().includes('DATE'))){headerRow=i;break;}
  }
  if(headerRow<0)return;
  // Detect shift columns by scanning header rows
  // For NM: shifts in columns 2-11 (3 cols each)
  // For SM: shifts in columns 2-3
  const isSM=sheetName.includes('SM')||sheetName.includes('sm');
  for(let i=headerRow+1;i<raw.length;i++){
    const row=raw[i];
    if(!row||!row[1])continue;
    let dateVal=row[1];
    if(!dateVal)continue;
    // Parse date
    let dateStr='';
    if(typeof dateVal==='number'){
      const d=new Date(Math.round((dateVal-25569)*86400*1000));
      dateStr=d.toISOString().split('T')[0];
    }else{
      const s=String(dateVal).trim();
      // Try DD-MMM-YYYY or YYYY-MM-DD
      const m=s.match(/(\d{1,2})[\/\-]([A-Za-z]+|\d{1,2})[\/\-](\d{2,4})/);
      if(m){
        const months={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
        const monthIdx=isNaN(m[2])?months[m[2].slice(0,3).toLowerCase()]:(parseInt(m[2])-1);
        const year=m[3].length===2?2000+parseInt(m[3]):parseInt(m[3]);
        const day=parseInt(m[1]);
        const d=new Date(year,monthIdx,day);
        dateStr=d.toISOString().split('T')[0];
      }else if(s.match(/\d{4}-\d{2}-\d{2}/)){
        dateStr=s.slice(0,10);
      }
    }
    if(!dateStr)continue;
    const dayVal=row[2]||'';
    if(isSM){
      // SM sheet: col 2 = Shift A (06:00-14:00), col 3 = Shift B (14:00-22:00)
      [[2,'A','in'],[3,'B','out']].forEach(([col,shift,dir])=>{
        const cell=row[col];
        if(!cell||typeof cell!=='string')return;
        const parts=cell.split('/').map(p=>p.trim());
        if(!parts[0])return;
        const staffName=parts[0].replace(/K$/,'').replace(/D$/,'').trim();
        // Look up full name in profiles
        const profile=findStaffByName(staffName)||findStaffByName(parts[0].trim());
        const fullName=profile?profile.name:parts[0].trim();
        const location=parts[1]||profile?.location||'';
        const direction=shift==='A'?'IN':shift==='B'?'OUT':'';
        parsed.push({date:dateStr,day:dayVal,shift,direction,staff_name:fullName,short_name:parts[0].trim(),location,contact_no:profile?.contact_no||'',team:'SM'});
      });
    }else{
      // NM sheet: 3 slots per shift in cols 3,4,5 (A), 6,7,8 (B), 9,10,11 (C)
      const shiftCols={A:[3,4,5],B:[6,7,8],C:[9,10,11]};
      const shiftDir={A:'IN',B:'OUT',C:'IN/OUT'};
      Object.entries(shiftCols).forEach(([shift,cols])=>{
        cols.forEach(col=>{
          const cell=row[col];
          if(!cell||typeof cell!=='string')return;
          const parts=cell.split('/').map(p=>p.trim());
          if(!parts[0])return;
          const profile=findStaffByName(parts[0]);
          const fullName=profile?profile.name:parts[0];
          const location=parts[1]||profile?.location||'';
          // NM: Shift A=IN, Shift B=OUT, Shift C=IN+OUT (2 trips)
          if(shift==='C'){
            parsed.push({date:dateStr,day:dayVal,shift,direction:'IN',staff_name:fullName,short_name:parts[0],location,contact_no:profile?.contact_no||'',team:'NM'});
            parsed.push({date:dateStr,day:dayVal,shift,direction:'OUT',staff_name:fullName,short_name:parts[0],location,contact_no:profile?.contact_no||'',team:'NM'});
          }else{
            parsed.push({date:dateStr,day:dayVal,shift,direction:shiftDir[shift],staff_name:fullName,short_name:parts[0],location,contact_no:profile?.contact_no||'',team:'NM'});
          }
        });
      });
    }
  }
}

/* ═══════════════════════════════════════════════════
   EXCEL PARSING — LOGIDIS BILLING
═══════════════════════════════════════════════════ */
function handleLogidisFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    // Find header row
    let headerIdx=-1;
    for(let i=0;i<raw.length;i++){
      const r=raw[i];
      if(r&&r.some(c=>typeof c==='string'&&c.toLowerCase().includes('pax'))){headerIdx=i;break;}
    }
    if(headerIdx<0){toast('Could not find header row in file');return;}
    S.logidisRows=raw.slice(headerIdx);
    // Validate each row
    S.logidisValidated=validateLogidisRows(S.logidisRows);
    S.logidisParsed=true;
    render();
  };
  reader.readAsArrayBuffer(file);
}

function validateLogidisRows(rows){
  const [headers,...data]=rows;
  // Map column indices
  const col=name=>headers.findIndex(h=>h&&h.toString().toLowerCase().includes(name.toLowerCase()));
  const cDate=col('date'), cPax=col('pax'), cPickup=col('pick'), cDropoff=col('drop'), cTimeIn=col('time in'), cTimeOut=col('time out');
  const results=[];
  data.forEach(row=>{
    if(!row||!row[cDate]||!row[cPax])return;
    let dateStr='';
    const rawDate=row[cDate];
    if(typeof rawDate==='number'){
      const d=new Date(Math.round((rawDate-25569)*86400*1000));
      dateStr=d.toISOString().split('T')[0];
    }else{
      const s=String(rawDate).trim();
      if(s.match(/\d{4}-\d{2}-\d{2}/))dateStr=s.slice(0,10);
      else{const parts=s.split('/');if(parts.length===3)dateStr=`${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;}
    }
    const pax=String(row[cPax]||'').trim();
    const timeIn=row[cTimeIn];
    const timeOut=row[cTimeOut];
    // Determine direction
    const direction=timeIn&&String(timeIn).length>1?'IN (to work)':timeOut&&String(timeOut).length>1?'OUT (from work)':'Unknown';
    const dirCode=direction.startsWith('IN')?'in':'out';
    // Find staff
    const profile=findStaffByName(pax);
    let status='NOT FOUND', note='';
    if(profile){
      // Check declaration
      const appUser=CONFIG.appUsers.find(u=>u.name===profile.name||(profile.app_user_id&&u.id===profile.app_user_id));
      if(appUser){
        const decl=dFor(appUser.id,dateStr);
        if(decl){
          const declaredLeg=dirCode==='in'?decl.leg_in:decl.leg_out;
          if(declaredLeg==='logidis'){status='VALIDATED';note='Declared Logidis';}
          else if(declaredLeg){status='QUERY';note=`Declared: ${declaredLeg}`;}
          else{status='QUERY';note='Leg not declared';}
        }else{status='QUERY';note='No declaration found';}
      }else{
        // NM team — just check they're in our system
        status='VALIDATED';note='Staff confirmed in system';
      }
    }else{
      status='NOT FOUND';note='Staff not in directory';
    }
    results.push({
      date:dateStr,pax,pickup:row[cPickup]||'',dropoff:row[cDropoff]||'',
      direction,status,note,
      rawRow:row,
    });
  });
  return results;
}

/* ═══════════════════════════════════════════════════
   EXCEL EXPORTS
═══════════════════════════════════════════════════ */
function exportLogidisRoster(){
  // Group by date, then by shift, then create clean roster
  const wb=XLSX.utils.book_new();
  const headers=['Date','Day','Shift','Direction','Time','Staff Name','Location','Contact No','Team'];
  const shiftTimes={A:{IN:'06:00',OUT:'14:00'},B:{IN:'14:00',OUT:'22:00'},C:{IN:'22:00',OUT:'06:00'}};
  const rows=S.rosterData.filter(r=>r.location).map(r=>{
    const time=shiftTimes[r.shift]?.[r.direction]||'';
    return[r.date,r.day,r.shift,r.direction,time,r.staff_name,r.location,r.contact_no||'',r.team];
  });
  rows.sort((a,b)=>a[0].localeCompare(b[0])||a[2].localeCompare(b[2])||a[3].localeCompare(b[3]));
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  // Style header row width
  ws['!cols']=[{wch:12},{wch:10},{wch:8},{wch:10},{wch:8},{wch:22},{wch:18},{wch:12},{wch:6}];
  XLSX.utils.book_append_sheet(wb,ws,'Logidis Roster');
  XLSX.writeFile(wb,`Logidis_Roster_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Logidis roster exported');
}

function exportLogidisValidated(){
  const wb=XLSX.utils.book_new();
  // Reconstruct original rows with added columns
  const addedHeaders=['Matched Staff','Direction','Validation Status','Note'];
  if(!S.logidisRows.length)return;
  const [origHeaders,...origData]=S.logidisRows;
  const newHeaders=[...origHeaders.map(h=>h||''),...addedHeaders];
  const newRows=S.logidisValidated.map(r=>[
    ...(r.rawRow.map(c=>c===null||c===undefined?'':c)),
    r.pax, r.direction, r.status, r.note
  ]);
  const ws=XLSX.utils.aoa_to_sheet([newHeaders,...newRows]);
  ws['!cols']=newHeaders.map((_,i)=>({wch:i>origHeaders.length-1?18:14}));
  XLSX.utils.book_append_sheet(wb,ws,'Validation');
  XLSX.writeFile(wb,`Logidis_Validated_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Annotated Excel exported');
}

function expCSV(){
  const L={logidis:'Logidis',own:'Own vehicle',bus:'Public bus',auto:'Public transport'};
  const rows=[['Date','Analyst','Shift','IN transport','IN driver','IN plate','OUT transport','OUT driver','OUT plate','Backdated','Refund eligible']];
  S.decls.forEach(d=>{
    const a=byId(d.analyst_id);
    rows.push([d.date,a?.name||d.analyst_id,d.shift,L[d.leg_in]||d.leg_in||'',d.driver_name_in||'',d.car_plate_in||'',L[d.leg_out]||d.leg_out||'',d.driver_name_out||'',d.car_plate_out||'',d.backdated?'Yes':'No',(isRef(d.leg_in)||isRef(d.leg_out))?'Yes':'No']);
  });
  S.events.filter(e=>!e.is_inline).forEach(e=>{
    const a=byId(e.analyst_id);
    rows.push([e.date,a?.name||e.analyst_id,'Special',(e.direction?.toUpperCase()||'')+' '+(e.event_time||''),'','','','',e.driver_name||'',e.car_plate||'','N/A','Yes']);
  });
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='soc-transport-'+new Date().toISOString().slice(0,7)+'.csv';
  a.click();URL.revokeObjectURL(url);toast('CSV downloaded');
}

async function subD(){
  const uid=S.user.id,s=SH[S.shift];
  const lIn=s.legs.find(l=>l.id==='in'),lOut=s.legs.find(l=>l.id==='out');
  const row={analyst_id:uid,date:S.date,shift:S.shift,
    leg_in:lIn.provided?(S.choices['in']||null):'auto',
    leg_out:lOut.provided?(S.choices['out']||null):'auto',
    backdated:S.date!==tod(),
    driver_name_in:S.dIn||null,car_plate_in:S.pIn||null,
    driver_name_out:S.dOut||null,car_plate_out:S.pOut||null,
  };
  const ok=await dbSaveDecl(row);if(!ok)return;
  const ps=[];
  if(!lIn.provided&&S.uIn&&S.udIn.time&&S.udIn.reason)
    ps.push(dbSaveEv({analyst_id:uid,date:S.date,event_time:S.udIn.time,direction:'in',reason:S.udIn.reason,driver_name:S.udIn.driver||null,car_plate:S.udIn.plate||null,reviewed:false,is_inline:true}));
  if(!lOut.provided&&S.uOut&&S.udOut.time&&S.udOut.reason)
    ps.push(dbSaveEv({analyst_id:uid,date:S.date,event_time:S.udOut.time,direction:'out',reason:S.udOut.reason,driver_name:S.udOut.driver||null,car_plate:S.udOut.plate||null,reviewed:false,is_inline:true}));
  await Promise.all(ps);
  S.choices={};S.shift=null;S.dIn='';S.pIn='';S.dOut='';S.pOut='';S.uIn=false;S.uOut=false;S.udIn={};S.udOut={};
  toast(row.backdated?'Backdated entry saved':'Declaration submitted');render();
}
