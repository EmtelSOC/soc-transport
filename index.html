function tod(){return new Date().toISOString().split('T')[0]}

function avc(c){return'av-'+(c||'blue')}
function isMgr(u){return u&&u.role==='manager'}
function anas(){return CONFIG.staff.filter(s=>s.role==='analyst')}
function mgrs(){return CONFIG.staff.filter(s=>s.role==='manager')}
function uDecls(uid){return S.decls.filter(d=>d.analyst_id===uid).sort((a,b)=>b.date.localeCompare(a.date))}
function dFor(uid,date){return S.decls.find(d=>d.analyst_id===uid&&d.date===date)}
function uEvs(uid){return S.events.filter(e=>e.analyst_id===uid&&!e.is_inline).sort((a,b)=>b.date.localeCompare(a.date))}

async function dbLoad(){
  S.loading=true;render();
  try{
    const[d,e]=await Promise.all([db.from('declarations').select('*'),db.from('special_events').select('*')]);
    if(d.error)throw d.error;
    if(e.error)throw e.error;
    S.decls=d.data||[];S.events=e.data||[];S.err=null;
  }catch(ex){S.err='Could not load data. Check your internet connection.';console.error(ex);}
  S.loading=false;render();
}

async function dbSaveDecl(row){
  const{data,error}=await db.from('declarations').upsert(row,{onConflict:'analyst_id,date'}).select();
  if(error){toast('Save failed — try again');console.error(error);return false;}
  S.decls=S.decls.filter(d=>!(d.analyst_id===row.analyst_id&&d.date===row.date));
  if(data)S.decls.push(...data);
  return true;
}

async function dbSaveEv(row){
  const{data,error}=await db.from('special_events').insert(row).select();
  if(error){toast('Save failed — try again');console.error(error);return false;}
  if(data)S.events.push(...data);
  return true;
}

async function dbUpdEv(id,changes){
  const{error}=await db.from('special_events').update(changes).eq('id',id);
  if(error){toast('Update failed');return false;}
  const ev=S.events.find(e=>e.id===id);
  if(ev)Object.assign(ev,changes);
  return true;
}

function render(){
  const app=document.getElementById('app');
  if(S.screen==='login'){app.innerHTML=rLogin();return;}
  if(S.screen==='pin'){app.innerHTML=rPin();return;}
  if(S.screen==='chg'){app.innerHTML=rChg();return;}
  if(S.screen==='rst'){app.innerHTML=rRst();return;}
  app.innerHTML=rApp();
}

function rLogin(){
  const card=s=>`<div class="nc ${S.selId===s.id?'sel':''}" onclick="selU(${s.id})">
    <div class="nc-av ${avc(s.color)}">${s.initials}</div>
    <div><div class="nc-name">${s.name}</div><div class="nc-role">${s.role==='manager'?'Manager':'Analyst'}</div></div>
  </div>`;
  return`<div class="login"><div class="login-top">
    <div class="login-logo">Emtel SOC</div>
    <div class="login-title">SOC Transport</div>
    <div class="login-sub">Select your name to sign in</div>
  </div><div class="login-body">
    <div class="login-sec">Managers</div><div class="ng">${mgrs().map(card).join('')}</div>
    <div class="login-sec">Analysts</div><div class="ng">${anas().map(card).join('')}</div>
  </div></div>`;
}

function selU(id){S.selId=id;S.pinBuf='';S.pinErr=false;S.pinMode='login';S.screen='pin';render();}

function rPin(){
  const u=byId(S.selId);
  const dots=[0,1,2,3].map(i=>`<div class="pd ${i<S.pinBuf.length?'f':''} ${S.pinErr&&i<S.pinBuf.length?'e':''}"></div>`).join('');
  const keys=[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>k===''?`<div class="pk emp"></div>`:`<button class="pk ${k==='⌫'?'del':''}" onclick="pK('${k}')">${k}</button>`).join('');
  return`<div class="pin-screen">
    <div class="pin-who">${u?.name||''}</div>
    <div class="pin-title">Enter your PIN</div>
    <div class="pin-hint">Default PIN is ${CONFIG.defaultPin}<br>if you haven't changed it yet</div>
    <div class="pin-dots">${dots}</div>
    <div class="pin-grid">${keys}</div>
    ${S.pinErr?`<div class="pin-err">Incorrect PIN — try again</div>`:''}
    <div class="pin-link" onclick="goRst(${S.selId})">Forgot PIN?</div>
    <div class="pin-back" onclick="goLogin()">← Back</div>
  </div>`;
}

function pK(k){
  if(k==='⌫'){S.pinBuf=S.pinBuf.slice(0,-1);S.pinErr=false;render();return;}
  if(S.pinBuf.length>=4)return;
  S.pinBuf+=k;render();
  if(S.pinBuf.length===4)setTimeout(chkPin,120);
}

function chkPin(){
  if(S.pinBuf===LS.getPin(S.selId)){
    S.user=byId(S.selId);LS.setSess(S.selId);
    S.screen='app';S.pinBuf='';S.pinErr=false;dbLoad();
  }else{
    S.pinErr=true;setTimeout(()=>{S.pinBuf='';S.pinErr=false;render();},800);render();
  }
}

function goLogin(){S.screen='login';S.selId=null;S.pinBuf='';S.pinErr=false;render();}

function rChg(){
  const step={old:['Verify current PIN','Enter your current PIN'],new:['Choose new PIN','Enter any 4-digit PIN'],cfm:['Confirm new PIN','Enter your new PIN again']};
  const[title,hint]=step[S.pinMode]||step.old;
  const buf=S.pinMode==='cfm'?S.pinNew:S.pinBuf;
  const dots=[0,1,2,3].map(i=>`<div class="pd ${i<buf.length?'f':''} ${S.pinErr&&i<buf.length?'e':''}"></div>`).join('');
  const keys=[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>k===''?`<div class="pk emp"></div>`:`<button class="pk ${k==='⌫'?'del':''}" onclick="cpK('${k}')">${k}</button>`).join('');
  return`<div class="pin-screen">
    <div class="pin-who">${S.user?.name}</div>
    <div class="pin-title">${title}</div>
    <div class="pin-hint">${hint}</div>
    <div class="pin-dots">${dots}</div>
    <div class="pin-grid">${keys}</div>
    ${S.pinErr?`<div class="pin-err">${S.pinMode==='cfm'?'PINs do not match':'Incorrect PIN'}</div>`:''}
    <div class="pin-back" onclick="canCP()">Cancel</div>
  </div>`;
}

function cpK(k){
  const isCfm=S.pinMode==='cfm';
  if(k==='⌫'){if(isCfm)S.pinNew=S.pinNew.slice(0,-1);else S.pinBuf=S.pinBuf.slice(0,-1);S.pinErr=false;render();return;}
  if(isCfm){if(S.pinNew.length>=4)return;S.pinNew+=k;}else{if(S.pinBuf.length>=4)return;S.pinBuf+=k;}
  render();
  if((isCfm?S.pinNew:S.pinBuf).length===4)setTimeout(stepCP,120);
}

function stepCP(){
  if(S.pinMode==='old'){
    if(S.pinBuf===LS.getPin(S.user.id)){S.pinMode='new';S.pinBuf='';S.pinErr=false;}
    else{S.pinErr=true;setTimeout(()=>{S.pinBuf='';S.pinErr=false;render();},800);}
  }else if(S.pinMode==='new'){S.pinMode='cfm';S.pinNew='';S.pinErr=false;}
  else if(S.pinMode==='cfm'){
    if(S.pinNew===S.pinBuf){LS.setPin(S.user.id,S.pinBuf);toast('PIN updated!');setTimeout(()=>{S.screen='app';S.pinBuf='';S.pinNew='';S.pinMode='login';render();},500);return;}
    else{S.pinErr=true;setTimeout(()=>{S.pinNew='';S.pinErr=false;render();},800);}
  }
  render();
}
function canCP(){S.screen='app';S.pinBuf='';S.pinNew='';S.pinMode='login';S.pinErr=false;render();}

function rRst(){
  const tid=S.pinTarget||S.selId,target=byId(tid);
  const dots=[0,1,2,3].map(i=>`<div class="pd ${i<S.pinBuf.length?'f':''} ${S.pinErr&&i<S.pinBuf.length?'e':''}"></div>`).join('');
  const keys=[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>k===''?`<div class="pk emp"></div>`:`<button class="pk ${k==='⌫'?'del':''}" onclick="rpK('${k}')">${k}</button>`).join('');
  return`<div class="pin-screen">
    <div class="pin-who">Reset PIN for ${target?.name}</div>
    <div class="pin-title">Manager override</div>
    <div class="pin-hint">A manager enters the override PIN.<br>This resets ${target?.name}'s PIN to ${CONFIG.defaultPin}.</div>
    <div class="pin-dots">${dots}</div>
    <div class="pin-grid">${keys}</div>
    ${S.pinErr?`<div class="pin-err">Incorrect override PIN</div>`:''}
    <div class="pin-back" onclick="canRP()">Cancel</div>
  </div>`;
}

function goRst(tid){S.pinTarget=tid;S.pinBuf='';S.pinErr=false;S.screen='rst';render();}
function rpK(k){
  if(k==='⌫'){S.pinBuf=S.pinBuf.slice(0,-1);S.pinErr=false;render();return;}
  if(S.pinBuf.length>=4)return;
  S.pinBuf+=k;render();
  if(S.pinBuf.length===4)setTimeout(chkRP,120);
}
function chkRP(){
  if(S.pinBuf===CONFIG.resetPin){
    const tid=S.pinTarget||S.selId;LS.resetPin(tid);toast('PIN reset to '+CONFIG.defaultPin);
    setTimeout(()=>{S.pinBuf='';S.pinTarget=null;S.screen=S.user?'app':'pin';render();},600);
  }else{S.pinErr=true;setTimeout(()=>{S.pinBuf='';S.pinErr=false;render();},800);render();}
}
function canRP(){S.pinBuf='';S.pinErr=false;S.screen=S.user?'app':'pin';render();}

function rApp(){
  const u=S.user,tab=isMgr(u)?S.mTab:S.sTab;
  const titles={declare:'Declare transport',history:'My history',special:'Special transport',account:'My account',today:"Today's log",recon:fmtM(),events:'Special events'};
  const body=S.loading?`<div class="loading"><div class="spin"></div>Loading…</div>`
    :S.err?`<div class="sec"><div class="err-bar">${S.err}</div><button class="btn btn-p" onclick="dbLoad()">Retry</button></div>`
    :isMgr(u)?rMgr():rStaff();
  const nav=isMgr(u)?rMNav():rSNav();
  return`<div><div class="hdr">
    <div><div class="hdr-title">${titles[tab]||'SOC Transport'}</div><div class="hdr-sub">${u?.name} · ${isMgr(u)?'Manager':'Analyst'}</div></div>
    <div class="hdr-av ${avc(u?.color)}" onclick="goAcct()">${u?.initials}</div>
  </div><div class="scroll">${body}</div>${nav}</div>`;
}

function rSNav(){
  return`<div class="bnav">${[{k:'declare',l:'Declare',i:I.cal},{k:'history',l:'History',i:I.chart},{k:'special',l:'Special',i:I.star},{k:'account',l:'Me',i:I.user}]
    .map(t=>`<button class="nb ${S.sTab===t.k?'on':''}" onclick="setST('${t.k}')">${t.i}<span>${t.l}</span></button>`).join('')}</div>`;
}
function rMNav(){
  const pc=pCnt();
  return`<div class="bnav">${[{k:'today',l:'Today',i:I.list},{k:'events',l:'Events',i:I.bell,d:pc>0},{k:'recon',l:'Month',i:I.doc},{k:'account',l:'Me',i:I.user}]
    .map(t=>`<button class="nb ${S.mTab===t.k?'on':''} ${t.d?'nb-dot':''}" onclick="setMT('${t.k}')">${t.i}<span>${t.l}</span></button>`).join('')}</div>`;
}

function rStaff(){
  if(S.sTab==='declare')return rDecl();
  if(S.sTab==='history')return rHist();
  if(S.sTab==='special')return rSpSt();
  if(S.sTab==='account')return rAcct();
  return'';
}

function rDecl(){
  const uid=S.user.id,isToday=S.date===tod(),ex=dFor(uid,S.date);
  return`<div class="sec">
    <div class="ig"><div class="lbl">Date</div><div style="display:flex;gap:8px;">
      <input type="date" class="inp" value="${S.date}" max="${tod()}" onchange="setDt(this.value)" style="flex:1;"/>
      ${!isToday?`<button class="btn btn-o btn-sm" onclick="setDt('${tod()}')">Today</button>`:''}
    </div></div>
    ${!isToday?`<div style="background:#FEF3C7;border-radius:10px;padding:9px 12px;font-size:12px;font-weight:700;color:#92400E;margin-bottom:14px;">Logging for a past date — will be marked backdated</div>`:''}
    ${S.err?`<div class="err-bar">${S.err}</div>`:''}
    ${ex?rDone(ex):rDForm()}
  </div>`;
}

function rDone(d){
  const sh=SHIFTS[d.shift],L={logidis:'Logidis',own:'Own vehicle',bus:'Public bus',auto:'Public transport'};
  return`<div style="background:#F0FDF4;border:2px solid #86EFAC;border-radius:16px;padding:18px;text-align:center;">
    <div style="font-size:15px;font-weight:800;color:#15803D;margin-bottom:8px;">Already submitted</div>
    <div style="font-size:13px;color:#166534;margin-bottom:12px;">${fmtD(d.date)}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;">
      <span class="bdg ${d.shift==='A'?'ba':d.shift==='B'?'bb':'bc'}">${d.shift} · ${sh?.time}</span>
      ${d.leg_in?`<span class="bdg ${d.leg_in==='logidis'?'bl':'br'}">IN: ${L[d.leg_in]||d.leg_in}</span>`:''}
      ${d.leg_out?`<span class="bdg ${d.leg_out==='logidis'?'bl':'br'}">OUT: ${L[d.leg_out]||d.leg_out}</span>`:''}
    </div>
    <div style="font-size:12px;color:#94A3B8;margin-top:12px;">To correct an entry, contact your manager</div>
  </div>`;
}

function rDForm(){
  let h=`<div class="lbl" style="margin-bottom:8px;">Your shift</div>
    <div class="shift-grid">${['A','B','C'].map(k=>`<div class="sc ${S.shift===k?'on'+k:''}" onclick="setSh('${k}')"><div class="sn">Shift ${k}</div><div class="st">${SHIFTS[k].time}</div></div>`).join('')}</div>`;
  if(S.shift){
    h+=`<div class="lbl" style="margin-bottom:10px;">Your journeys</div>`;
    SHIFTS[S.shift].legs.forEach(leg=>{h+=rLeg(leg);});
    const need=SHIFTS[S.shift].legs.filter(l=>l.provided).length,done=Object.keys(S.choices).length,ok=done>=need;
    h+=`<button class="btn btn-p ${ok?'':'disabled'}" ${ok?'':'disabled'} onclick="subD()" style="margin-top:4px;">${ok?'Submit declaration':'Complete all journey choices above'}</button>`;
  }else h+=`<div class="empty">Select your shift above to continue</div>`;
  return h;
}

function rLeg(leg){
  const c=S.choices[leg.id],dv=leg.id==='in'?S.dIn:S.dOut,pv=leg.id==='in'?S.pIn:S.pOut;
  const ut=leg.id==='in'?S.uIn:S.uOut,ud=leg.id==='in'?S.udIn:S.udOut;
  let h=`<div class="leg"><div class="leg-h"><span class="leg-name">${leg.label} · ${leg.time}</span>
    ${leg.provided?`<span class="bdg" style="background:#DCFCE7;color:#166534;font-size:10px;">Transport available</span>`:''}
  </div>`;
  if(leg.provided){
    h+=`<div class="choices">${[{k:'logidis',l:'Logidis'},{k:'own',l:'Own vehicle'},{k:'bus',l:'Public bus'}].map(o=>
      `<button class="cb ${c===o.k?o.k==='logidis'?'cL':o.k==='own'?'cO':'cB':''}" onclick="pick('${leg.id}','${o.k}')">${o.l}</button>`
    ).join('')}</div>`;
    if(c==='logidis')h+=`<div class="drv-box"><div class="drv-title">Logidis vehicle details</div>
      <div class="irow">
        <div style="flex:1;"><div class="lbl">Driver name</div><input class="inp" style="padding:9px 11px;font-size:13px;" placeholder="e.g. Jean-Pierre" value="${dv}" oninput="S.${leg.id==='in'?'dIn':'dOut'}=this.value"/></div>
        <div style="flex:1;"><div class="lbl">Car plate</div><input class="inp" style="padding:9px 11px;font-size:13px;text-transform:uppercase;" placeholder="e.g. B 1234 X" value="${pv}" oninput="S.${leg.id==='in'?'pIn':'pOut'}=this.value.toUpperCase()"/></div>
      </div></div>`;
    if(c&&c!=='logidis')h+=`<div class="refund-note">Bus fare refund eligible for this leg</div>`;
  }else{
    h+=`<div class="fixed-note">No company transport scheduled for this leg</div>
      <div class="refund-note">Bus fare refund eligible — auto-included</div>
      <div class="divider"></div>
      <div class="tog-row" onclick="togU('${leg.id}')">
        <span class="tog-lbl">Company transport was provided today?</span>
        <div class="tog ${ut?'on':''}"><div class="tog-th"></div></div>
      </div>`;
    if(ut)h+=`<div class="unsch-box">
      <div style="font-size:11px;font-weight:700;color:#A21CAF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Unscheduled transport details</div>
      <div class="ig"><div class="lbl">Actual time</div><input type="time" class="inp" style="padding:9px 11px;font-size:13px;" value="${ud.time||''}" onchange="setUD('${leg.id}','time',this.value)"/></div>
      <div class="irow">
        <div style="flex:1;" class="ig"><div class="lbl">Driver name</div><input class="inp" style="padding:9px 11px;font-size:13px;" placeholder="Optional" value="${ud.driver||''}" oninput="setUD('${leg.id}','driver',this.value)"/></div>
        <div style="flex:1;" class="ig"><div class="lbl">Car plate</div><input class="inp" style="padding:9px 11px;font-size:13px;text-transform:uppercase;" placeholder="Optional" value="${ud.plate||''}" oninput="setUD('${leg.id}','plate',this.value.toUpperCase())"/></div>
      </div>
      <div class="ig"><div class="lbl">Reason</div><input class="inp" style="padding:9px 11px;font-size:13px;" placeholder="e.g. Heavy rain, cyclone warning…" value="${ud.reason||''}" oninput="setUD('${leg.id}','reason',this.value)"/>
      <div style="font-size:11px;color:#94A3B8;margin-top:4px;">Manager may adjust wording</div></div>
    </div>`;
  }
  return h+'</div>';
}

function rHist(){
  const uid=S.user.id,hist=uDecls(uid);
  const logT=hist.reduce((s,h)=>s+(h.leg_in==='logidis'?1:0)+(h.leg_out==='logidis'?1:0),0);
  const refD=hist.filter(h=>isRef(h.leg_in)||isRef(h.leg_out)).length;
  const c14=[...hist].slice(0,14).reverse();
  const bars=c14.map(e=>{
    const l=(e.leg_in==='logidis'?1:0)+(e.leg_out==='logidis'?1:0),r=(isRef(e.leg_in)?1:0)+(isRef(e.leg_out)?1:0);
    const sp=S.events.some(s=>s.analyst_id===uid&&s.date===e.date),t=Math.max(l+r,1),lp=Math.round((l/t)*100);
    return`<div class="chart-col"><div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:1px;">
      ${l?`<div class="chart-bar" style="height:${lp}%;background:#10B981;"></div>`:''}
      ${r?`<div class="chart-bar" style="height:${100-lp}%;background:#F59E0B;"></div>`:''}
      ${sp?`<div style="height:3px;background:#EC4899;border-radius:0;"></div>`:''}
    </div><div class="chart-lbl">${e.date.slice(8)}</div></div>`;
  }).join('');
  const L={logidis:'Logidis',own:'Own vehicle',bus:'Public bus',auto:'Public transport'};
  const items=hist.length?hist.map(e=>{
    const sh=SHIFTS[e.shift],hasR=isRef(e.leg_in)||isRef(e.leg_out);
    const spd=S.events.filter(s=>s.analyst_id===uid&&s.date===e.date&&!s.is_inline);
    const drv=e.leg_in==='logidis'&&(e.driver_name_in||e.car_plate_in)?`<div style="font-size:11px;color:#64748B;margin-top:4px;">${e.driver_name_in||''} ${e.car_plate_in?'· '+e.car_plate_in:''}</div>`:'';
    return`<div class="he"><div class="he-row">
      <div><div class="he-date">${fmtD(e.date)}</div>${e.backdated?`<span class="tag-back">Backdated</span>`:''}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;">
        <span class="bdg ${e.shift==='A'?'ba':e.shift==='B'?'bb':'bc'}">${e.shift}</span>
        ${hasR?'<span class="bdg br">Refund</span>':''}${spd.length?'<span class="bdg bp">Special</span>':''}
      </div></div>
      <div class="he-bdgs">
        ${e.leg_in?`<span class="bdg ${e.leg_in==='logidis'?'bl':'br'}">IN: ${L[e.leg_in]||e.leg_in}</span>`:''}
        ${e.leg_out?`<span class="bdg ${e.leg_out==='logidis'?'bl':'br'}">OUT: ${L[e.leg_out]||e.leg_out}</span>`:''}
        ${spd.map(s=>`<span class="bdg bp">Special ${s.direction?.toUpperCase()||''} ${s.event_time||''}</span>`).join('')}
      </div>${drv}
    </div>`;
  }).join(''):`<div class="empty">No declarations yet — use Declare tab to log your first entry</div>`;
  return`<div class="sec">
    <div class="met3"><div class="met"><div class="v">${hist.length}</div><div class="l">Days logged</div></div>
      <div class="met"><div class="v">${logT}</div><div class="l">Logidis</div></div>
      <div class="met"><div class="v" style="color:#15803D;">${refD}</div><div class="l">Refund days</div></div></div>
    ${c14.length?`<div class="card"><div class="card-title">Last ${c14.length} days</div>
      <div class="chart-wrap">${bars}</div>
      <div class="legend"><div class="leg-it"><div class="leg-dot" style="background:#10B981;"></div>Logidis</div>
        <div class="leg-it"><div class="leg-dot" style="background:#F59E0B;"></div>Refund-eligible</div>
        <div class="leg-it"><div class="leg-dot" style="background:#EC4899;"></div>Special</div></div></div>`:''}
    <div class="card"><div class="card-title">Full log — ${fmtM()}</div>${items}</div>
  </div>`;
}

function rSpSt(){
  const uid=S.user.id,sp=uEvs(uid);
  const form=S.spShow?rSpForm():`<button class="btn btn-pk" style="margin-bottom:16px;" onclick="togSp(true)">+ Log a special transport trip</button>`;
  const items=sp.length?sp.map(e=>`<div class="spc ${e.reviewed?'rev':''}">
    <div class="flex-bet" style="margin-bottom:8px;">
      <div><div style="font-size:13px;font-weight:700;">${fmtD(e.date)}</div>

    ${form}
    ${!S.spShow?`<div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;">Your special transport history</div>${items}`:''}
  </div>`;

  const f=S.spForm,ok=f.direction&&f.time&&f.reason;
  return`<div style="border:2px solid #EC4899;border-radius:16px;padding:16px;margin-bottom:16px;">

      <button class="btn btn-sm ${f.direction==='out'?'btn-p':'btn-o'}" style="flex:1;" onclick="spf('direction','out')">OUT — from work</button>
    </div></div>
    <div class="ig"><div class="lbl">Actual time</div><input type="time" class="inp" value="${f.time||''}" onchange="spf('time',this.value)"/></div>
    <div class="irow">
      <div style="flex:1;" class="ig"><div class="lbl">Driver name</div><input class="inp" style="padding:9px 11px;font-size:13px;" placeholder="Optional" value="${f.driver||''}" oninput="spf('driver',this.value)"/></div>
      <div style="flex:1;" class="ig"><div class="lbl">Car plate</div><input class="inp" style="padding:9px 11px;font-size:13px;text-transform:uppercase;" placeholder="Optional" value="${f.plate||''}" oninput="spf('plate',this.value.toUpperCase())"/></div>
    </div>
    <div class="ig"><div class="lbl">Reason</div><input class="inp" style="padding:9px 11px;font-size:13px;" placeholder="e.g. Heavy rain, cyclone warning…" value="${f.reason||''}" oninput="spf('reason',this.value)"/>
      <div style="font-size:11px;color:#94A3B8;margin-top:4px;">Manager may adjust the wording</div></div>
    <button class="btn btn-p ${ok?'':'disabled'}" ${ok?'':'disabled'} onclick="subSp()" style="margin-bottom:8px;">Submit</button>
    <button class="btn btn-o" onclick="togSp(false)">Cancel</button>
  </div>`;
}

function rAcct(){
  const u=S.user,isM=isMgr(u);
  return`<div class="sec">
    <div style="padding:24px 0 20px;text-align:center;">
      <div class="nc-av ${avc(u.color)}" style="width:72px;height:72px;font-size:24px;margin:0 auto 12px;">${u.initials}</div>
      <div style="font-size:20px;font-weight:800;">${u.name}</div>
      <div style="font-size:13px;color:#94A3B8;font-weight:600;margin-top:4px;">${isM?'Manager':'Analyst'} · Emtel SOC</div>
    </div>
    <div class="mi" onclick="stCP()"><div class="mi-left"><div class="mi-ico" style="background:#EFF6FF;font-size:18px;">🔑</div>
      <div><div class="mi-lbl">Change PIN</div><div class="mi-sub">Update your 4-digit PIN</div></div></div><span style="color:#CBD5E1;font-size:20px;">›</span></div>
    <div class="mi" onclick="goRst(${u.id})"><div class="mi-left"><div class="mi-ico" style="background:#FEF3C7;font-size:18px;">🔓</div>
      <div><div class="mi-lbl">Reset PIN</div><div class="mi-sub">Manager override — resets to ${CONFIG.defaultPin}</div></div></div><span style="color:#CBD5E1;font-size:20px;">›</span></div>
    <div class="mi" onclick="logout()" style="margin-top:16px;"><div class="mi-left"><div class="mi-ico" style="background:#FEE2E2;font-size:18px;">🚪</div>
      <div><div class="mi-lbl" style="color:#B91C1C;">Sign out</div><div class="mi-sub">You'll need your PIN to sign back in</div></div></div><span style="color:#CBD5E1;font-size:20px;">›</span></div>
  </div>`;
}

function rMgr(){
  if(S.mTab==='today')return rMToday();
  if(S.mTab==='events')return rMEvs();
  if(S.mTab==='recon')return rMRecon();
  if(S.mTab==='account')return rAcct();
  return'';
}

function rMToday(){
  const td=tod(),tdd=S.decls.filter(d=>d.date===td),total=anas().length;
  const logT=tdd.reduce((s,d)=>s+(d.leg_in==='logidis'?1:0)+(d.leg_out==='logidis'?1:0),0);
  const refT=tdd.reduce((s,d)=>s+(isRef(d.leg_in)?1:0)+(isRef(d.leg_out)?1:0),0);
  const spT=S.events.filter(e=>e.date===td).length;
  const L={logidis:'Logidis',own:'Own',bus:'Bus',auto:'Auto'};
  const rows=anas().map(a=>{
    const d=tdd.find(x=>x.analyst_id===a.id),hasSp=S.events.some(e=>e.analyst_id===a.id&&e.date===td);
    const sh=d?.shift?SHIFTS[d.shift]:null;
    const cell=(val,prov)=>{
      if(!prov)return`<span class="bdg bg" style="font-size:10px;">Auto</span>`;
      if(!val)return`<span class="bdg bg" style="font-size:10px;">–</span>`;
      return`<span class="bdg ${val==='logidis'?'bl':'br'}" style="font-size:10px;">${L[val]||val}</span>`;
    };
    return`<div class="rr"><div class="rav ${avc(a.color)}">${a.initials}</div>
      <div style="flex:1;"><div class="rname">${a.name}</div><div class="rsub">${d?'Shift '+d.shift:'Not declared'}</div></div>
      <div class="rbdgs">
        ${sh?cell(d?.leg_in,sh.legs[0].provided):''}
        ${sh?cell(d?.leg_out,sh.legs[1].provided):''}
        ${hasSp?`<span class="bdg bp" style="font-size:10px;">Special</span>`:''}
        <span class="bdg ${d?'bo':'bg'}" style="font-size:10px;">${d?'Done':'Pending'}</span>
      </div></div>`;
  }).join('');
  return`<div class="sec">
    <div class="met4"><div class="met"><div class="v">${tdd.length}/${total}</div><div class="l">Declared</div></div>
      <div class="met"><div class="v">${logT}</div><div class="l">Logidis</div></div>
      <div class="met"><div class="v" style="color:#15803D;">${refT}</div><div class="l">Refund</div></div>
      <div class="met"><div class="v" style="color:#BE185D;">${spT}</div><div class="l">Special</div></div></div>
    <div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;">${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div>
    <div class="roster">${rows||'<div class="empty">No analysts</div>'}</div>
  </div>`;
}

function rMEvs(){
  const sorted=[...S.events].filter(e=>!e.is_inline).sort((a,b)=>(a.reviewed===b.reviewed?0:a.reviewed?1:-1)||b.date.localeCompare(a.date));
  const items=sorted.map(e=>{
    const a=byId(e.analyst_id),isEd=S.editEvId===e.id;
    return`<div class="spc ${e.reviewed?'rev':''}">
      <div class="flex-bet" style="margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="rav ${a?avc(a.color):'av-blue'}">${a?.initials||'?'}</div>
          <div><div style="font-size:13px;font-weight:700;">${a?.name||'Unknown'}</div>
            <div style="font-size:12px;color:#64748B;">${fmtD(e.date)} · ${e.direction?.toUpperCase()||''} · ${e.event_time||''}</div>
            ${e.driver_name||e.car_plate?`<div style="font-size:11px;color:#64748B;">${e.driver_name||''} ${e.car_plate?'· '+e.car_plate:''}</div>`:''}</div>
        </div>
        <span class="bdg" style="${e.reviewed?'background:#DCFCE7;color:#15803D;':'background:#FEE2E2;color:#B91C1C;'}">${e.reviewed?'Reviewed':'New'}</span>
      </div>
      ${isEd?`<input class="inp" id="ed-${e.id}" value="${e.reason||''}" style="margin-bottom:8px;font-size:13px;"/>`:
        `<div style="font-size:13px;color:#BE185D;background:#FCE7F3;border-radius:8px;padding:8px 10px;margin-bottom:10px;">${e.reason||''}</div>`}
      <div style="display:flex;gap:8px;">
        ${isEd?`<button class="btn btn-p btn-sm" style="flex:1;" onclick="saveEd(${e.id})">Save</button><button class="btn btn-o btn-sm" style="flex:1;" onclick="canEd()">Cancel</button>`
              :`<button class="btn btn-o btn-sm" style="flex:1;" onclick="editEv(${e.id})">Edit reason</button>
               ${!e.reviewed?`<button class="btn btn-sm" style="flex:1;background:#10B981;color:#fff;" onclick="markRev(${e.id})">Mark reviewed</button>`
                            :`<button class="btn btn-o btn-sm" style="flex:1;opacity:.4;" disabled>Reviewed</button>`}`}
      </div></div>`;
  }).join('');
  return`<div class="sec">
    <div class="info-bar" style="background:#FCE7F3;color:#BE185D;">Review and edit reason if needed, then mark as reviewed.</div>
    ${sorted.length?items:'<div class="empty">No special events logged yet</div>'}
  </div>`;
}

function rMRecon(){
  const sum=anas().map(a=>{
    const d=uDecls(a.id);
    const logT=d.reduce((s,x)=>s+(x.leg_in==='logidis'?1:0)+(x.leg_out==='logidis'?1:0),0);
    const refD=d.filter(x=>isRef(x.leg_in)||isRef(x.leg_out)).length;
    const spC=uEvs(a.id).length;
    return{a,logT,refD,spC};
  });
  const tL=sum.reduce((s,x)=>s+x.logT,0),tR=sum.reduce((s,x)=>s+x.refD,0),tS=sum.reduce((s,x)=>s+x.spC,0);
  const rows=sum.map(({a,logT,refD,spC})=>`<div class="recon-row">
    <div class="rav ${avc(a.color)}">${a.initials}</div>
    <div style="flex:1;"><div style="font-size:13px;font-weight:700;">${a.name}</div><div style="font-size:11px;color:#94A3B8;">${spC} special trip${spC!==1?'s':''}</div></div>
    <div style="display:flex;gap:20px;"><div class="rn"><div class="n">${logT}</div><div class="l">Logidis</div></div>
      <div class="rn"><div class="n" style="color:#15803D;">${refD}</div><div class="l">Refund</div></div></div>
  </div>`).join('');
  return`<div class="sec">
    <div class="met3"><div class="met"><div class="v">${tL}</div><div class="l">Logidis</div></div>
      <div class="met"><div class="v" style="color:#15803D;">${tR}</div><div class="l">Refund days</div></div>
      <div class="met"><div class="v" style="color:#BE185D;">${tS}</div><div class="l">Special</div></div></div>
    <div class="card"><div class="card-title">Per analyst — ${fmtM()}</div>${rows||'<div class="empty">No data yet</div>'}</div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <button class="btn btn-o" onclick="expCSV()">Export CSV</button>
      <button class="btn btn-d" onclick="dbLoad();toast('Refreshed')">Refresh</button>
    </div>
  </div>`;
}

// Actions
function setST(t){S.sTab=t;render();}
function setMT(t){S.mTab=t;render();}
function goAcct(){if(isMgr(S.user))S.mTab='account';else S.sTab='account';render();}
function setDt(d){S.date=d;S.shift=null;S.choices={};S.dIn='';S.pIn='';S.dOut='';S.pOut='';S.uIn=false;S.uOut=false;S.udIn={};S.udOut={};render();}
function setSh(k){S.shift=k;S.choices={};S.dIn='';S.pIn='';S.dOut='';S.pOut='';S.uIn=false;S.uOut=false;render();}
function pick(id,c){S.choices[id]=c;render();}
function togU(id){if(id==='in')S.uIn=!S.uIn;else S.uOut=!S.uOut;render();}
function setUD(id,f,v){if(id==='in')S.udIn[f]=v;else S.udOut[f]=v;}
function togSp(v){S.spShow=v;S.spForm={date:tod()};render();}
function spf(k,v){S.spForm[k]=v;render();}
function editEv(id){S.editEvId=id;render();}
function canEd(){S.editEvId=null;render();}
function stCP(){S.screen='chg';S.pinMode='old';S.pinBuf='';S.pinNew='';S.pinErr=false;render();}
function logout(){LS.clearSess();S.user=null;S.screen='login';render();}

async function subD(){
  const uid=S.user.id,sh=SHIFTS[S.shift];
  const lIn=sh.legs.find(l=>l.id==='in'),lOut=sh.legs.find(l=>l.id==='out');
  const row={
    analyst_id:uid,date:S.date,shift:S.shift,
    leg_in:lIn.provided?(S.choices['in']||null):'auto',
    leg_out:lOut.provided?(S.choices['out']||null):'auto',
    backdated:S.date!==tod(),
    driver_name_in:S.dIn||null,car_plate_in:S.pIn||null,
    driver_name_out:S.dOut||null,car_plate_out:S.pOut||null,
  };
  const ok=await dbSaveDecl(row);
  if(!ok)return;
  const ps=[];
  if(!lIn.provided&&S.uIn&&S.udIn.time&&S.udIn.reason)
    ps.push(dbSaveEv({analyst_id:uid,date:S.date,event_time:S.udIn.time,direction:'in',reason:S.udIn.reason,driver_name:S.udIn.driver||null,car_plate:S.udIn.plate||null,reviewed:false,is_inline:true}));
  if(!lOut.provided&&S.uOut&&S.udOut.time&&S.udOut.reason)
    ps.push(dbSaveEv({analyst_id:uid,date:S.date,event_time:S.udOut.time,direction:'out',reason:S.udOut.reason,driver_name:S.udOut.driver||null,car_plate:S.udOut.plate||null,reviewed:false,is_inline:true}));
  await Promise.all(ps);
  S.choices={};S.shift=null;S.dIn='';S.pIn='';S.dOut='';S.pOut='';S.uIn=false;S.uOut=false;S.udIn={};S.udOut={};
  toast(row.backdated?'Backdated entry saved':'Declaration submitted!');render();
}

async function subSp(){
  const f=S.spForm;
  const ok=await dbSaveEv({analyst_id:S.user.id,date:f.date||tod(),event_time:f.time,direction:f.direction,reason:f.reason,driver_name:f.driver||null,car_plate:f.plate||null,reviewed:false,is_inline:false});
  if(!ok)return;
  S.spShow=false;S.spForm={};toast('Special trip logged');render();
}

async function saveEd(id){
  const el=document.getElementById('ed-'+id);
  if(!el)return;
  const ok=await dbUpdEv(id,{reason:el.value});
  if(ok){S.editEvId=null;render();}
}

async function markRev(id){
  const ok=await dbUpdEv(id,{reviewed:true});
  if(ok){toast('Marked as reviewed');render();}
}

function expCSV(){
  const L={logidis:'Logidis',own:'Own vehicle',bus:'Public bus',auto:'Public transport'};
  const rows=[['Date','Analyst','Shift','IN transport','IN driver','IN plate','OUT transport','OUT driver','OUT plate','Backdated','Refund eligible']];
  S.decls.forEach(d=>{
    const a=byId(d.analyst_id);
    rows.push([d.date,a?.name||d.analyst_id,d.shift,L[d.leg_in]||d.leg_in||'',d.driver_name_in||'',d.car_plate_in||'',L[d.leg_out]||d.leg_out||'',d.driver_name_out||'',d.car_plate_out||'',d.backdated?'Yes':'No',(isRef(d.leg_in)||isRef(d.leg_out))?'Yes':'No']);
  });
  S.events.filter(e=>!e.is_inline).forEach(e=>{
    const a=byId(e.analyst_id);
    rows.push([e.date,a?.name||e.analyst_id,'Special',(e.direction?.toUpperCase()||'')+' '+(e.event_time||''),'','','','',e.driver_name||'',e.car_plate||'','N/A','Yes']);
  });
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='soc-transport-'+new Date().toISOString().slice(0,7)+'.csv';
  a.click();URL.revokeObjectURL(url);toast('CSV downloaded');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

// Boot
(function(){
  const s=LS.getSess();
  if(s){const u=byId(s.id);if(u){S.user=u;S.screen='app';dbLoad();return;}}
  S.screen='login';render();
})();
</script>
</body>
</html>
